    <script type="text/x-mathjax-config">
        MathJax.Hub.Config({
            tex2jax: {
                inlineMath: [['$','$'], ['\\(','\\)']],
                displayMath: [['$$','$$'], ['\\[','\\]']],
                processEscapes: true

    <style>
        :root {
            --primary: #4a6fa5;
            --secondary: #166088;
            --accent: #2a9d8f;
            --light: #f8f9fa;
            --dark: #212529;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }

        header {
            background-color: var(--primary);
            color: white;
            padding: 1.5rem 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: relative;
            z-index: 10;
        }

        header h1 { margin: 0; font-size: 2rem; }

        .subtitle { opacity: 0.9; margin-top: 0.5rem; font-size: 1rem; }

        .nav {
            background-color: var(--secondary);
            padding: 1rem 0;
            position: relative;
            z-index: 15;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-size: 1.5rem; font-weight: bold; color: white; text-decoration: none; }

        .nav-links { display: flex; gap: 1.5rem; }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.3s;
        }

        .nav-links a:hover { opacity: 0.8; }

        .dashboard {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px auto;
            max-width: 1100px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .dashboard div { text-align: center; flex: 1; }
        .dashboard p { margin: 5px 0; color: #333; }

        .dashboard button {
            padding: 10px 20px;
            margin: 5px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        .dashboard button:hover { background: #228B7E; }
        .dashboard button:disabled { background: #cccccc; cursor: not-allowed; }

        .main-container {
            max-width: 1100px;
            margin: 20px auto;
            padding: 20px;
            display: flex;
            gap: 30px;
        }

        .sidebar-nav {
            flex-basis: 200px;
            background-color: #fff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 20px;
            height: fit-content;
            z-index: 5;
        }

        .sidebar-nav button {
            display: block;
            padding: 10px 15px;
            margin-bottom: 10px;
            width: 100%;
            text-align: left;
            border: none;
            background-color: #f8f9fa;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.2s, color 0.2s;
        }

        .sidebar-nav button:hover { background-color: #e9ecef; }

        .sidebar-nav button.active {
            background-color: var(--accent);
            color: #fff;
            font-weight: bold;
        }

        .main-content { flex-grow: 1; }

        .question {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;
            margin-bottom: 20px;
        }

        .question-meta {
            display: flex;
            gap: 20px;
            font-size: 0.9em;
            color: var(--accent);
            margin-bottom: 10px;
            font-weight: 500;
        }

        .question p { margin: 10px 0; font-size: 1.1em; }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 15px 0;
        }

        .option {
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 10px 15px;
            cursor: pointer;
            transition: background 0.2s, border 0.2s;
            font-size: 1em;
        }

        .option:hover { background: #e9ecef; border-color: #aaa; }
        .option.selected-correct { background: #d4edda; border-color: #28a745; }
        .option.selected-wrong { background: #f8d7da; border-color: #dc3545; }

        .feedback {
            margin-top: 10px;
            font-weight: bold;
            display: none;
        }

        .feedback.correct { color: #28a745; display: block; }
        .feedback.wrong { color: #dc3545; display: block; }

        #results {
            display: none;
            margin: 20px 0;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        footer {
            background-color: var(--primary);
            color: white;
            text-align: center;
            padding: 1.5rem 0;
            margin-top: 3rem;
        }

        @media (max-width: 768px) {
            .nav-container { flex-direction: column; gap: 1rem; }
            .main-container { flex-direction: column; padding: 10px; gap: 15px; }
            .dashboard { flex-direction: column; gap: 15px; }
            .sidebar-nav {
                flex-basis: auto;
                width: 100%;
                position: static;
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
            }
            .sidebar-nav button { width: auto; flex-grow: 1; }
        }

        @media (max-width: 600px) {
            .question { padding: 15px; }
            .option { padding: 8px 12px; }
        }
    </style>

        .topic-section > h2 { margin: 0 0 1rem; font-size: 1.15rem; }

        .option:hover { background: #f0f0f0; border-color: #0d0d0d; }
        .feedback { font-weight: bold; }
        .feedback.correct { color: #28a745; }
        .feedback.wrong { color: #c62828; }
        footer { background: #ffffff; color: #0d0d0d; border: 2px solid #0d0d0d; box-shadow: 2px 2px 0px #0d0d0d; }

</head>
<body>
    <header>
        <h1>Practice Test 5 (GR9768)</h1>
        <p class="subtitle">GRE Mathematics Subject Test &mdash; 66 Questions, 170 Minutes</p>
    </header>

    <nav class="nav">
        <div class="nav-container">

        <div><p id="time-elapsed">00:00</p><p>Time Elapsed</p></div>

    <div class="main-container">
        <nav class="sidebar-nav" id="sidebar-nav"></nav>
        <div class="main-content">
            <div id="results">
                <h2>Results</h2>
                <p id="time-taken"></p>
                <p id="incorrect-counts"></p>
            </div>

    <footer>

    <script>
        let globalTimerInterval;
        let globalStartTime;
        let pauseTime;
        let answeredQuestions = new Set();
        let correctFirstAttempts = new Set();
        let incorrectCounts = {};
        let isStarted = false;
        let isPaused = false;

        function escapeHtml(s) {
            return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        function renderTextWithBreaks(s) {
            return escapeHtml(s).replace(/\n\n/g, "<br><br>").replace(/\n/g, "<br>");
        }

        function renderStem(s) {
            const htmlTokens = [];
            function tok(html) {
                const t = "\x00T" + htmlTokens.length + "\x00";
                htmlTokens.push(html);
                return t;
            }
            function safe(t) {
                return t.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            }

            // \begin{align*}...\end{align*} → display math for MathJax
            s = s.replace(/\\begin\{align\*\}([\s\S]*?)\\end\{align\*\}/g,
                (_, b) => tok("\\[\\begin{aligned}" + safe(b) + "\\end{aligned}\\]"));

            // \begin{center}\begin{tabular}...\end{tabular}\end{center} → HTML table
            s = s.replace(/\\begin\{center\}\s*\\begin\{tabular\}\{[^}]+\}([\s\S]*?)\\end\{tabular\}\s*\\end\{center\}/g,
                (_, body) => {
                    const rows = body.replace(/\\hline/g, "").trim().split(/\\\\\s*\n?/).map(r => r.trim()).filter(Boolean);
                    const htmlRows = rows.map(row => {
                        const cells = row.split(/\s*&\s*/);
                        return "<tr>" + cells.map(c => "<td style=\"padding:3px 8px;border:1px solid #888;text-align:center\">" + safe(c.trim()) + "</td>").join("") + "</tr>";
                    });
                    return tok("<div style=\"overflow-x:auto;margin:8px 0\"><table style=\"border-collapse:collapse;margin:0 auto\">" + htmlRows.join("") + "</table></div>");
                });

            // \begin{center}...\end{center} → centered italic block (for quoted statements)
            s = s.replace(/\\begin\{center\}([\s\S]*?)\\end\{center\}/g,
                (_, b) => tok("<div style=\"text-align:center;margin:6px 0;padding:2px 12px;border-left:2px solid #ccc;font-style:italic\">" + safe(b.trim()) + "</div>"));

            // \begin{enumerate}...\end{enumerate} with labeled items (I./II./III.) → ordered list
            s = s.replace(/\\begin\{enumerate\}([\s\S]*?)\\end\{enumerate\}/g, (_, body) => {
                const items = [];
                const itemRx = /\\item\[([^\]]+)\]\s*([\s\S]*?)(?=\\item\[|$)/g;
                let im;
                while ((im = itemRx.exec(body)) !== null) {
                    const content = im[2].trim();
                    if (content) items.push("<li>" + safe(content) + "</li>");
                }
                if (!items.length) {
                    body.split(/\\item\s+/).filter(Boolean).forEach(i => {
                        if (i.trim()) items.push("<li>" + safe(i.trim()) + "</li>");
                    });
                }
                return tok("<ol style=\"margin:6px 0 6px 22px\">" + items.join("") + "</ol>");
            });

            // \underline{...} → <u>
            s = s.replace(/\\underline\{([^}$\n]+)\}/g, (_, b) => tok("<u>" + safe(b) + "</u>"));

            // Escape remaining HTML special chars (math inside $...$ is safe via decoded DOM)
            s = safe(s);

            // Restore HTML tokens
            s = s.replace(/\x00T(\d+)\x00/g, (_, i) => htmlTokens[Number(i)]);

            return s.replace(/\n\n/g, "<br><br>").replace(/\n/g, "<br>");
        }

        function parseAnswerTable(md) {
            const map = {};
            // Find the LAST tabular in the document (the answer key, not Q17's data table)
            const tabRx = /\\begin\{tabular\}\{[\s\S]*?\\end\{tabular\}/g;
            let tabMatch, lastBlock = null;
            while ((tabMatch = tabRx.exec(md)) !== null) lastBlock = tabMatch[0];
            if (!lastBlock) return map;
            const rows = lastBlock.split("\n").filter(line => line.includes("&") && line.includes("\\\\"));
            rows.forEach((line) => {
                const clean = line.replace(/\\\\/g, "").trim();
                const cells = clean.split("&").map(s => s.trim());
                if (cells.length >= 3 && /^\d+$/.test(cells[0])) {
                    map[Number(cells[0])] = cells[1];
                }
                if (cells.length >= 6 && /^\d+$/.test(cells[3])) {
                    map[Number(cells[3])] = cells[4];
                }
            });
            return map;
        }

        function parseQuestions(md) {
            // Split on the LAST \begin{center} to exclude the answer key table.
            // Q14 and Q17 also have \begin{center} in their bodies, so we must NOT
            // split on the first occurrence.
            const parts = md.split("\\begin{center}");
            const beforeTable = parts.length > 1
                ? parts.slice(0, -1).join("\\begin{center}")
                : md;
            const answers = parseAnswerTable(md);
            const rx = /(?:^|\n)(\d+)\.\s([\s\S]*?)(?=\n\d+\.\s|$)/g;
            const questions = [];
            let m;
            while ((m = rx.exec(beforeTable)) !== null) {
                const n = Number(m[1]);
                const body = m[2].trim();
                const lastEnumStart = body.lastIndexOf("\\begin{enumerate}");
                const lastEnumEnd = body.lastIndexOf("\\end{enumerate}");
                if (lastEnumStart < 0 || lastEnumEnd < 0 || lastEnumEnd <= lastEnumStart) continue;
                const stem = body.slice(0, lastEnumStart).trim();
                const optionBlock = body.slice(lastEnumStart, lastEnumEnd + "\\end{enumerate}".length);
                const options = {};
                const optionRx = /\\item\[\(([A-E])\)\]\s*([\s\S]*?)(?=\\item\[\([A-E]\)\]|\\end\{enumerate\})/g;
                let om;
                while ((om = optionRx.exec(optionBlock)) !== null) {
                    options[om[1]] = om[2].trim();
                }
                if (Object.keys(options).length !== 5) continue;
                questions.push({
                    n,
                    stem,
                    options,
                    answer: answers[n] || "A"
                });
            }
            return questions.sort((a, b) => a.n - b.n);
        }

        function ranges() {
            return [
                ["sec-1-10", 1, 10], ["sec-11-20", 11, 20], ["sec-21-30", 21, 30],
                ["sec-31-40", 31, 40], ["sec-41-50", 41, 50], ["sec-51-60", 51, 60], ["sec-61-66", 61, 66]
            ];
        }

        function buildUI(questions) {
            const sectionsRoot = document.getElementById("sections-root");
            const sidebar = document.getElementById("sidebar-nav");
            sectionsRoot.innerHTML = "";
            sidebar.innerHTML = "";

            ranges().forEach(([id, lo, hi], idx) => {
                const subset = questions.filter(q => q.n >= lo && q.n <= hi);
                if (!subset.length) return;

                const btn = document.createElement("button");
                btn.textContent = `Q ${lo}-${hi}`;
                btn.className = idx === 0 ? "active" : "";
                btn.addEventListener("click", () => showSection(id));
                sidebar.appendChild(btn);

                const sec = document.createElement("section");
                sec.id = `${id}-section`;
                sec.className = "topic-section";
                sec.style.display = idx === 0 ? "block" : "none";
                sec.innerHTML = `<h2>Questions ${lo}-${hi}</h2>`;

                subset.forEach((q) => {
                    const qDiv = document.createElement("div");
                    qDiv.className = "question";
                    qDiv.id = `q${q.n}`;
                    qDiv.setAttribute("data-correct", q.answer);
                    qDiv.innerHTML = `
                        <div class="question-meta"><span>&#10060; <span class="q-errors" data-errors="0">0</span></span></div>
                        <p><strong>${q.n}.</strong> ${renderStem(q.stem)}</p>
<div class="options">
                            ${["A","B","C","D","E"].map(L => `<div class="option" data-value="${L}">${renderTextWithBreaks(q.options[L])}</div>`).join("")}
                        </div>
                        <div class="feedback"></div>
                    `;
                    sec.appendChild(qDiv);
                });
                sectionsRoot.appendChild(sec);
            });

            document.getElementById("questions-answered").textContent = `0/${questions.length}`;
            wireOptionEvents();
            MathJax.Hub.Queue(["Typeset", MathJax.Hub]);
        }

        function showSection(sectionId) {
            document.querySelectorAll(".topic-section").forEach(s => s.style.display = "none");
            document.querySelectorAll(".sidebar-nav button").forEach(b => b.classList.remove("active"));
            const sec = document.getElementById(`${sectionId}-section`);
            if (sec) sec.style.display = "block";
            const idx = ranges().findIndex(([id]) => id === sectionId);
            const btns = Array.from(document.querySelectorAll(".sidebar-nav button"));
            if (idx >= 0 && btns[idx]) btns[idx].classList.add("active");
            MathJax.Hub.Queue(["Typeset", MathJax.Hub]);
        }

        function updateScoreUI() {
            const totalQ = document.querySelectorAll(".question").length;
            const correctNow = correctFirstAttempts.size;
            const answeredNow = answeredQuestions.size;
            const accNow = answeredNow > 0 ? Math.round((correctNow / answeredNow) * 100) : 0;
            document.getElementById("questions-answered").textContent = `${answeredNow}/${totalQ}`;
            document.getElementById("correct-answers").textContent = String(correctNow);
            document.getElementById("accuracy-rate").textContent = `${accNow}%`;
        }

        function wireOptionEvents() {
            document.querySelectorAll(".option").forEach(option => {
                option.addEventListener("click", function () {
                    if (!isStarted) return;
                    const question = this.closest(".question");
                    const questionId = question.id;
                    const questionNum = parseInt(questionId.replace("q", ""), 10);
                    const correct = question.getAttribute("data-correct");
                    const selected = this.getAttribute("data-value");
                    const feedback = question.querySelector(".feedback");
                    const isFirstAttempt = !answeredQuestions.has(questionNum);

                    if (question.querySelector(".option.selected-correct")) return;

                    if (selected === correct) {
                        this.classList.add("selected-correct");
                        feedback.textContent = "Correct!";
                        feedback.className = "feedback correct";
                        if (isFirstAttempt) correctFirstAttempts.add(questionNum);
                        answeredQuestions.add(questionNum);
                    } else {
                        this.classList.add("selected-wrong");
                        feedback.textContent = "Incorrect. Try again!";
                        feedback.className = "feedback wrong";
                        incorrectCounts[questionId] = (incorrectCounts[questionId] || 0) + 1;
                        const err = question.querySelector(".q-errors");
                        err.setAttribute("data-errors", String(incorrectCounts[questionId]));
                        err.textContent = String(incorrectCounts[questionId]);
                        if (isFirstAttempt) answeredQuestions.add(questionNum);
                    }
                    feedback.style.display = "block";
                    updateScoreUI();
                });
            });
        }

        function startTimers() {
            if (!isStarted) {
                globalStartTime = new Date();
                isStarted = true;
            }
            if (isPaused) {
                const pausedDuration = new Date() - pauseTime;
                globalStartTime = new Date(globalStartTime.getTime() + pausedDuration);
                isPaused = false;
            }
            globalTimerInterval = setInterval(() => {
                const elapsed = Math.floor((new Date() - globalStartTime) / 1000);
                const m = Math.floor(elapsed / 60);
                const s = elapsed % 60;
                document.getElementById("time-elapsed").textContent =
                    `${m.toString().padStart(2, "0")}:${s.toString().padStart(2, "0")}`;
            }, 1000);
            document.getElementById("start-btn").disabled = true;
            document.getElementById("pause-btn").disabled = false;
            document.getElementById("reset-btn").disabled = false;
            document.getElementById("results-btn").disabled = false;
        }

        function pauseTimers() {
            if (!isPaused) {
                clearInterval(globalTimerInterval);
                pauseTime = new Date();
                isPaused = true;
                document.getElementById("pause-btn").textContent = "Resume";
            } else {
                startTimers();
                document.getElementById("pause-btn").textContent = "Pause";
            }
        }

        function resetTimers() {
            if (globalTimerInterval) clearInterval(globalTimerInterval);
            globalStartTime = null;
            answeredQuestions.clear();
            correctFirstAttempts.clear();
            incorrectCounts = {};
            isStarted = false;
            isPaused = false;
            document.getElementById("time-elapsed").textContent = "00:00";
            document.getElementById("correct-answers").textContent = "0";
            document.getElementById("accuracy-rate").textContent = "0%";
            document.getElementById("start-btn").disabled = false;
            document.getElementById("pause-btn").disabled = true;
            document.getElementById("pause-btn").textContent = "Pause";
            document.getElementById("reset-btn").disabled = true;
            document.getElementById("results-btn").disabled = true;
            document.getElementById("results").style.display = "none";
            document.querySelectorAll(".option").forEach(o => o.classList.remove("selected-correct", "selected-wrong"));
            document.querySelectorAll(".feedback").forEach(f => { f.style.display = "none"; f.className = "feedback"; f.textContent = ""; });
            document.querySelectorAll(".q-errors").forEach(e => { e.setAttribute("data-errors", "0"); e.textContent = "0"; });
            updateScoreUI();
        }

        function showResults() {
            const allQ = document.querySelectorAll(".question");
            const totalQ = allQ.length;
            const totalTime = globalStartTime ? Math.floor((new Date() - globalStartTime) / 1000) : 0;
            const mins = Math.floor(totalTime / 60);
            const secs = totalTime % 60;
            const correctCount = correctFirstAttempts.size;
            const accuracy = totalQ > 0 ? Math.round((correctCount / totalQ) * 100) : 0;
            const wrongAttempts = Object.values(incorrectCounts).reduce((a, b) => a + b, 0);
            const rawScore = correctCount - wrongAttempts / 4;
            let summary = "<strong>Question Summary:</strong><ul>";
            allQ.forEach((el) => {
                const qid = el.id;
                const qn = Number(qid.replace("q", ""));
                const count = incorrectCounts[qid] || 0;
                const status = !answeredQuestions.has(qn) ? "Not attempted" : (correctFirstAttempts.has(qn) ? "Correct" : "Incorrect");
                summary += `<li>Q${qn}: ${status}, ${count} wrong attempt(s)</li>`;

    \item[III.] It is unbounded on the interval $[0, \infty)$.
\end{enumerate}
Which of the same three properties does $f$ necessarily have?
\begin{enumerate}
    \item[(A)] I only
    \item[(B)] II only
    \item[(C)] III only
    \item[(D)] II and III only
    \item[(E)] I, II, and III
\end{enumerate}

56. For every set $S$ and every metric $d$ on $S$, which of the following is a metric on $S$ ?
\begin{enumerate}
    \item[(A)] $4 + d$
    \item[(B)] $e^d - 1$
    \item[(C)] $d - |d|$
    \item[(D)] $d^2$
    \item[(E)] $\sqrt{d}$
\end{enumerate}

57. Let $\mathbb{R}$ be the field of real numbers and $\mathbb{R}[x]$ the ring of polynomials in $x$ with coefficients in $\mathbb{R}$. Which of the following subsets of $\mathbb{R}[x]$ is a subring of $\mathbb{R}[x]$ ?
\begin{enumerate}
    \item[I.] All polynomials whose coefficient of $x$ is zero
    \item[II.] All polynomials whose degree is an even integer, together with the zero polynomial
    \item[III.] All polynomials whose coefficients are rational numbers
\end{enumerate}
\begin{enumerate}
    \item[(A)] I only
    \item[(B)] II only
    \item[(C)] I and III only
    \item[(D)] II and III only
    \item[(E)] I, II, and III
\end{enumerate}

58. Let $f$ be a real-valued function defined and continuous on the set of real numbers $\mathbb{R}$. Which of the following must be true of the set $S = \{f(c) \colon 0 < c < 1\}$ ?
\begin{enumerate}
    \item[I.] $S$ is a connected subset of $\mathbb{R}$.
    \item[II.] $S$ is an open subset of $\mathbb{R}$.
    \item[III.] $S$ is a bounded subset of $\mathbb{R}$.
\end{enumerate}
\begin{enumerate}
    \item[(A)] I only
    \item[(B)] I and II only
    \item[(C)] I and III only
    \item[(D)] II and III only
    \item[(E)] I, II, and III
\end{enumerate}

59. A cyclic group of order 15 has an element $x$ such that the set $\{x^3, x^5, x^9\}$ has exactly two elements. The number of elements in the set $\{x^{13n} \colon n \text{ is a positive integer}\}$ is
\begin{enumerate}
    \item[(A)] 3
    \item[(B)] 5
    \item[(C)] 8
    \item[(D)] 15
    \item[(E)] infinite
\end{enumerate}

60. If $S$ is a ring with the property that $s = s^2$ for each $s \in S$, which of the following must be true?
\begin{enumerate}
    \item[I.] $s + s = 0$ for each $s \in S$.
    \item[II.] $(s + t)^2 = s^2 + t^2$ for each $s, t \in S$.
    \item[III.] $S$ is commutative.
\end{enumerate}
\begin{enumerate}
    \item[(A)] III only
    \item[(B)] I and II only
    \item[(C)] I and III only
    \item[(D)] II and III only
    \item[(E)] I, II, and III
\end{enumerate}

61. What is the greatest integer that divides $p^4 - 1$ for every prime number $p$ greater than 5 ?
\begin{enumerate}
    \item[(A)] 12
    \item[(B)] 30
    \item[(C)] 48
    \item[(D)] 120
    \item[(E)] 240
\end{enumerate}

62. The coefficient of $x^3$ in the expansion of $(1 + x)^3(2 + x^2)^{10}$ is
\begin{enumerate}
    \item[(A)] $2^{14}$
    \item[(B)] $31$
    \item[(C)] $\binom{3}{3} + \binom{10}{1}$
    \item[(D)] $\binom{3}{3} + 2\binom{10}{1}$
    \item[(E)] $\binom{3}{3}\binom{10}{1}2^9$
\end{enumerate}

63. At how many points in the $xy$-plane do the graphs of $y = x^{12}$ and $y = 2^x$ intersect?
\begin{enumerate}
    \item[(A)] None
    \item[(B)] One
    \item[(C)] Two
    \item[(D)] Three
    \item[(E)] Four
\end{enumerate}

64. Suppose that $f$ is a continuous real-valued function defined on the closed interval $[0, 1]$. Which of the following must be true?
\begin{enumerate}
    \item[I.] There is a constant $C > 0$ such that $|f(x) - f(y)| \le C$ for all $x$ and $y$ in $[0, 1]$.
    \item[II.] There is a constant $D > 0$ such that $|f(x) - f(y)| \le 1$ for all $x$ and $y$ in $[0, 1]$ that satisfy $|x - y| \le D$.
    \item[III.] There is a constant $E > 0$ such that $|f(x) - f(y)| \le E|x - y|$ for all $x$ and $y$ in $[0, 1]$.
\end{enumerate}
\begin{enumerate}
    \item[(A)] I only
    \item[(B)] III only
    \item[(C)] I and II only
    \item[(D)] II and III only
    \item[(E)] I, II, and III
\end{enumerate}

65. Let $p(x)$ be the polynomial $x^3 + ax^2 + bx + c$, where $a$, $b$, and $c$ are real constants. If $p(-3) = p(2) = 0$ and $p'(-3) < 0$, which of the following is a possible value of $c$ ?

    \item[(B)] $-18$
    \item[(C)] $-6$
    \item[(D)] $-3$
